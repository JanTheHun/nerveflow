<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nerve - Workflow Runtime</title>
  <style>
    :root {
      --bg: #fcfcfd;
      --surface: #ffffff;
      --line: #e2e6ed;
      --line-strong: #d5dbe5;
      --text: #151a22;
      --muted: #536074;
      --accent: #1459b7;
      --accent-hover: #0f4a99;
      --ok: #1f7a39;
      --err: #bf2f2f;
      --code-bg: #f5f7fa;
    }
    * { box-sizing: border-box; }
    body { 
      font-family: "Segoe UI", "Inter", "SF Pro Text", "Helvetica Neue", sans-serif;
      max-width: 1160px; 
      margin: 0 auto; 
      padding: 16px;
      background: var(--bg);
      color: var(--text);
    }
    .header {
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--surface);
    }
    h1 {
      margin: 0;
      color: var(--text);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .subhead {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .panel {
      background: var(--surface);
      padding: 12px;
      border: 1px solid var(--line);
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
    }
    textarea { 
      width: 100%; 
      height: 310px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace; 
      padding: 10px;
      border: 1px solid var(--line-strong);
      background: var(--code-bg);
      font-size: 14px;
      line-height: 1.35;
      resize: vertical;
      color: var(--text);
    }
    textarea:focus,
    .input-row input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(20, 89, 183, 0.12);
      background: #fff;
    }
    .input-row {
      margin-top: 10px;
    }
    .input-row label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .input-row input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line-strong);
      background: var(--code-bg);
      font-size: 14px;
      color: var(--text);
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    }
    .button-group {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }
    button { 
      padding: 8px 14px;
      background: var(--accent);
      color: white; 
      border: none; 
      border-radius: 2px;
      cursor: pointer; 
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }
    .button-secondary {
      background: #5a6475;
    }
    .button-secondary:hover {
      background: #4b5565;
    }
    .output { 
      background: var(--code-bg);
      padding: 10px;
      overflow-y: auto; 
      max-height: 470px;
      border: 1px solid var(--line-strong);
      font-size: 12px;
      line-height: 1.35;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    }
    pre { 
      margin: 0; 
      white-space: pre-wrap; 
      word-wrap: break-word;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    }
    .result-line {
      margin-bottom: 8px;
    }
    .state-display {
      background: #eef2f7;
      padding: 8px;
      margin-top: 8px;
      border: 1px solid var(--line);
    }
    .error { color: var(--err); font-weight: 700; }
    .success { color: var(--ok); font-weight: 700; }
    .info { color: var(--muted); }
    summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
    }
    @media (max-width: 800px) {
      .container { grid-template-columns: 1fr; }
      textarea { height: 260px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Nerve Minimal Host</h1>
    <div class="subhead">Runtime Console Surface</div>
  </header>
  
  <div class="container">
    <div class="panel">
      <h2>Write a Script</h2>
      <textarea id="script" placeholder="Enter a .nrv script...">state.total_messages = state.total_messages + 1
state.last_message = event.value
output text "Messages processed: ${state.total_messages}"</textarea>
      <div class="input-row">
        <label for="messageInput">Event message</label>
        <input id="messageInput" type="text" value="hello nerve" placeholder="Type the user message sent to the workflow">
      </div>
      <div class="button-group">
        <button onclick="runScript()">▶ Run</button>
        <button onclick="loadExample()" class="button-secondary">↺ Reset</button>
      </div>
    </div>
    
    <div class="panel">
      <h2>Runtime Snapshot</h2>
      <div class="output" id="results">
        <div class="info">Ready to run...</div>
      </div>
    </div>
  </div>

  <script>
    let currentState = {
      total_messages: 0,
      last_message: '',
    };

    function loadExample() {
      document.getElementById('script').value = `state.total_messages = state.total_messages + 1
state.last_message = event.value
output text "Messages processed: \${state.total_messages}"`;
      document.getElementById('messageInput').value = 'hello nerve';
      document.getElementById('results').innerHTML = '<div class="info">Ready to run...</div>';
      currentState = {
        total_messages: 0,
        last_message: '',
      };
    }

    async function runScript() {
      const source = document.getElementById('script').value.trim();
      const messageValue = document.getElementById('messageInput').value.trim() || 'hello nerve';
      const resultsDiv = document.getElementById('results');
      
      if (!source) {
        resultsDiv.innerHTML = '<div class="error">Script is empty. Write something or click "Example".</div>';
        return;
      }
      
      try {
        resultsDiv.innerHTML = '<div class="info">Running...</div>';
        
        const res = await fetch('/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            source, 
            state: currentState,
            event: { type: 'user_message', value: messageValue },
          })
        });
        
        const data = await res.json();
        
        if (data.ok) {
          currentState = data.state || currentState;

          const events = (data.runtimeEvents || [])
            .filter(e => e.type === 'output')
            .map(e => {
              if (typeof e.content === 'string') return e.content;
              return JSON.stringify(e.payload);
            })
            .join('\n');
            
          resultsDiv.innerHTML = `
            <div class="success">✓ Success</div>
            <div><strong>Event message:</strong> ${escapeHtml(messageValue)}</div>
            ${events ? `<div><strong>Output:</strong><pre>${escapeHtml(events)}</pre></div>` : ''}
            <div class="state-display">
              <strong>State:</strong>
              <pre>${escapeHtml(JSON.stringify(data.state, null, 2))}</pre>
            </div>
            <details style="margin-top: 10px;">
              <summary>Full Response</summary>
              <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
            </details>
          `;
        } else {
          resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(data.error)}</div>`;
        }
      } catch (err) {
        resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(err.message)}</div>`;
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Load example on page load
    window.addEventListener('load', () => {
      loadExample();
    });
  </script>
</body>
</html>
