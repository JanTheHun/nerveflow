<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Agent — Memory Store</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e2e2;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.25rem; margin: 0 0 1.5rem; color: #a78bfa; letter-spacing: 0.03em; }
    label { display: block; font-size: 0.8rem; color: #9ca3af; margin-bottom: 0.3rem; }
    input[type="text"], textarea, select {
      width: 100%;
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 6px;
      color: #e2e2e2;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: #6d28d9;
    }
    textarea#text { min-height: 160px; }
    textarea#metadata { min-height: 120px; font-family: "Fira Code", monospace; font-size: 0.82rem; }
    .field { margin-bottom: 1.1rem; }
    .row { display: flex; gap: 0.75rem; align-items: flex-end; margin-bottom: 1.1rem; }
    .row .field { flex: 1; margin: 0; }
    .row .field--narrow { max-width: 120px; }
    button {
      background: #6d28d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.25rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover { background: #7c3aed; }
    button:disabled { background: #3b2f58; cursor: not-allowed; }
    #log {
      margin-top: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .log-entry {
      border-radius: 6px;
      padding: 0.65rem 0.85rem;
      font-size: 0.8rem;
      font-family: "Fira Code", monospace;
      white-space: pre-wrap;
      word-break: break-all;
      animation: fadein 0.2s ease;
    }
    .log-entry.ok    { background: #0d2b1a; border: 1px solid #166534; color: #86efac; }
    .log-entry.error { background: #2b0d0d; border: 1px solid #991b1b; color: #fca5a5; }
    .log-label { font-size: 0.7rem; color: #6b7280; margin-bottom: 0.2rem; }
    .log-clear { float: right; font-size: 0.7rem; color: #4b5563; cursor: pointer; background: none; border: none; padding: 0; }
    .log-clear:hover { color: #9ca3af; }
    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin: 1.5rem 0 0.75rem;
      border-top: 1px solid #1f1f2e;
      padding-top: 1rem;
    }
    .log-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-top: 1rem;
    }
    .secondary-button {
      background: transparent;
      border: 1px solid #2e2e3e;
      color: #9ca3af;
      padding: 0.45rem 0.8rem;
    }
    .secondary-button:hover {
      background: #171722;
      color: #e5e7eb;
    }
    .filters-wrap {
      margin-top: 0.25rem;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      padding: 0.8rem;
      background: #12121a;
    }
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.6rem;
      margin-bottom: 0.55rem;
      align-items: end;
    }
    .filter-row:last-child {
      margin-bottom: 0;
    }
    .tiny-label {
      font-size: 0.72rem;
      color: #7f8aa0;
      margin-bottom: 0.2rem;
      display: block;
    }
    .tiny-input {
      width: 100%;
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 6px;
      color: #e2e2e2;
      padding: 0.45rem 0.6rem;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
    }
    .tiny-input:focus {
      border-color: #6d28d9;
    }
    .icon-button {
      background: transparent;
      border: 1px solid #3e2f5f;
      color: #c4b5fd;
      padding: 0.42rem 0.65rem;
      line-height: 1;
    }
    .icon-button:hover {
      background: #1a1430;
      color: #ddd6fe;
    }
    .filters-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.45rem;
    }
    .result-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 0.5rem;
    }
    .result-card {
      border: 1px solid #1f5130;
      background: rgba(7, 46, 27, 0.45);
      border-radius: 6px;
      padding: 0.75rem;
    }
    .result-card-head {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.45rem;
    }
    .result-score {
      color: #bbf7d0;
      font-size: 0.74rem;
    }
    .result-text {
      margin: 0 0 0.45rem;
      color: #f0fdf4;
    }
    .result-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.55rem;
    }
    .danger-button {
      background: transparent;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 0.35rem 0.7rem;
      font-size: 0.76rem;
    }
    .danger-button:hover {
      background: #3b1010;
      color: #fecaca;
    }
  </style>
</head>
<body>
  <h1>Music Agent — Memory Store</h1>

  <div class="field">
    <label for="wsUrl">Runtime WebSocket URL</label>
    <input type="text" id="wsUrl" value="ws://127.0.0.1:4190/api/runtime/ws" spellcheck="false" />
  </div>

  <p class="section-title">Remember</p>

  <div class="field">
    <label for="text">Text <span style="color:#6b7280">(what to remember)</span></label>
    <textarea id="text" placeholder="e.g. Radiohead — OK Computer (1997). Art rock, alternative. Albums: Pablo Honey, The Bends, OK Computer, Kid A..."></textarea>
  </div>

  <div class="field">
    <label for="metadata">Metadata <span style="color:#6b7280">(JSON)</span></label>
    <textarea id="metadata" spellcheck="false">{
  "category": "music",
  "songList": []
}</textarea>
  </div>

  <div id="editBanner" class="log-entry" style="display:none; margin-bottom: 0.9rem;"></div>

  <button id="saveBtn" onclick="save()">Save to Memory</button>
  <button id="cancelEditBtn" class="secondary-button" style="display:none; margin-left:0.6rem;" onclick="cancelEdit()">Cancel Edit</button>

  <p class="section-title">Recall</p>

  <div class="row">
    <div class="field">
      <label for="query">Query <span style="color:#6b7280">(semantic search)</span></label>
      <input type="text" id="query" placeholder="e.g. British rock bands with concept albums" />
    </div>
    <div class="field field--narrow">
      <label for="queryLimit">Limit</label>
      <select id="queryLimit">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </div>
    <button onclick="recall()">Recall</button>
  </div>

  <div class="field">
    <label>Metadata Filters <span style="color:#6b7280">(optional key/value match)</span></label>
    <div id="filters" class="filters-wrap"></div>
    <div class="filters-toolbar">
      <button class="secondary-button" onclick="addFilterRow('', '')">+ Add Filter</button>
    </div>
  </div>

  <div class="log-toolbar">
    <button class="secondary-button" onclick="clearLog()">Clear Results</button>
  </div>

  <div id="log"></div>

  <script>
    let activeDeleteButton = null;
    let editRecordId = "";

    function makeFilterRow(key = "", value = "") {
      const row = document.createElement("div");
      row.className = "filter-row";

      const keyWrap = document.createElement("div");
      const keyLabel = document.createElement("label");
      keyLabel.className = "tiny-label";
      keyLabel.textContent = "Key";
      const keyInput = document.createElement("input");
      keyInput.type = "text";
      keyInput.className = "tiny-input filter-key";
      keyInput.placeholder = "category";
      keyInput.value = key;
      keyWrap.appendChild(keyLabel);
      keyWrap.appendChild(keyInput);

      const valueWrap = document.createElement("div");
      const valueLabel = document.createElement("label");
      valueLabel.className = "tiny-label";
      valueLabel.textContent = "Value";
      const valueInput = document.createElement("input");
      valueInput.type = "text";
      valueInput.className = "tiny-input filter-value";
      valueInput.placeholder = "music";
      valueInput.value = value;
      valueWrap.appendChild(valueLabel);
      valueWrap.appendChild(valueInput);

      const actions = document.createElement("div");
      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "icon-button";
      removeBtn.textContent = "Remove";
      removeBtn.onclick = () => {
        row.remove();
        ensureAtLeastOneFilterRow();
      };
      actions.appendChild(removeBtn);

      row.appendChild(keyWrap);
      row.appendChild(valueWrap);
      row.appendChild(actions);
      return row;
    }

    function addFilterRow(key = "", value = "") {
      const root = document.getElementById("filters");
      root.appendChild(makeFilterRow(key, value));
    }

    function ensureAtLeastOneFilterRow() {
      const root = document.getElementById("filters");
      if (!root.querySelector(".filter-row")) {
        addFilterRow("", "");
      }
    }

    function collectRecallFilters() {
      const rows = Array.from(document.querySelectorAll("#filters .filter-row"));
      const filter = {};

      for (const row of rows) {
        const key = row.querySelector(".filter-key")?.value?.trim() || "";
        const value = row.querySelector(".filter-value")?.value?.trim() || "";
        if (!key) continue;
        filter[key] = value;
      }

      return filter;
    }

    function uuid() {
      return crypto.randomUUID ? crypto.randomUUID()
        : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
          });
    }

    function formatMessage(msg) {
      if (!msg || typeof msg !== "object") return msg;

      function extractJsonOutput(exec) {
        const events = Array.isArray(exec?.events) ? exec.events : [];
        for (let i = events.length - 1; i >= 0; i -= 1) {
          const event = events[i];
          if (event?.type === "output" && event?.format === "json") {
            return event.value;
          }
        }
        return null;
      }

      function simplifyItem(item) {
        if (!item || typeof item !== "object") return item;
        return {
          id: item.id,
          text: item.text,
          similarity: item.similarity,
          metadata: item.metadata ?? {},
        };
      }

      if (msg.type === "event" && msg.eventName === "nextv_execution") {
        const exec = msg.payload ?? {};
        const event = exec.event ?? {};
        const state = exec.snapshot?.state ?? {};
        const output = extractJsonOutput(exec);

        if (event.type === "remember_music") {
          if (output && typeof output === "object") return output;
          return {
            status: "stored",
            text: event.value,
            totalStored: state.storeCount ?? 0,
            metadata: state.lastStored?.metadata ?? {},
          };
        }

        if (event.type === "recall_music") {
          if (output && typeof output === "object") {
            const items = Array.isArray(output.items) ? output.items.map(simplifyItem) : [];
            return {
              kind: "recall_music",
              query: output.query ?? event.value,
              count: Number.isFinite(Number(output.count)) ? Number(output.count) : items.length,
              items,
            };
          }
          const items = Array.isArray(state.lastResults) ? state.lastResults.map(simplifyItem) : [];
          return {
            kind: "recall_music",
            query: event.value,
            count: items.length,
            items,
          };
        }

        if (event.type === "delete_music") {
          if (output && typeof output === "object") return output;
          return {
            kind: "delete_music",
            id: event.value,
            deleted: Boolean(state.lastDeleted?.deleted),
          };
        }

        if (event.type === "update_music") {
          if (output && typeof output === "object") return output;
          return {
            kind: "update_music",
            id: event.value,
            updated: Boolean(state.lastUpdated?.updated),
          };
        }

        return exec;
      }

      if (msg.ok === false) {
        return msg.error ?? msg;
      }

      return msg.data ?? msg;
    }

    function buildMetadataBlock(metadata) {
      const pre = document.createElement("pre");
      pre.style.margin = "0";
      pre.textContent = JSON.stringify(metadata ?? {}, null, 2);
      return pre;
    }

    function renderRecallDisplay(display) {
      const wrapper = document.createElement("div");

      const summary = document.createElement("div");
      summary.textContent = `query: ${display.query} | count: ${display.count}`;
      wrapper.appendChild(summary);

      const list = document.createElement("div");
      list.className = "result-list";

      for (const item of display.items ?? []) {
        const card = document.createElement("div");
        card.className = "result-card";
        card.dataset.memoryId = item.id || "";

        const head = document.createElement("div");
        head.className = "result-card-head";

        const title = document.createElement("strong");
        title.textContent = "match";
        head.appendChild(title);

        const score = document.createElement("div");
        score.className = "result-score";
        score.textContent = `similarity: ${item.similarity ?? "n/a"}`;
        head.appendChild(score);
        card.appendChild(head);

        const text = document.createElement("p");
        text.className = "result-text";
        text.textContent = item.text || "";
        card.appendChild(text);

        card.appendChild(buildMetadataBlock(item.metadata));

        if (item.id) {
          const actions = document.createElement("div");
          actions.className = "result-actions";
          const editBtn = document.createElement("button");
          editBtn.className = "secondary-button";
          editBtn.style.padding = "0.35rem 0.7rem";
          editBtn.style.fontSize = "0.76rem";
          editBtn.style.marginRight = "0.4rem";
          editBtn.textContent = "Edit";
          editBtn.onclick = () => editMemoryItem(item);
          actions.appendChild(editBtn);
          const button = document.createElement("button");
          button.className = "danger-button";
          button.textContent = "Delete";
          button.onclick = () => deleteMemoryItem(item.id, button);
          actions.appendChild(button);
          card.appendChild(actions);
        }

        list.appendChild(card);
      }

      wrapper.appendChild(list);
      return wrapper;
    }

    function appendLog(label, msg, isError) {
      const log = document.getElementById("log");
      const display = isError ? msg : formatMessage(msg);
      const entry = document.createElement("div");
      entry.className = "log-entry " + (isError ? "error" : "ok");
      const lbl = document.createElement("div");
      lbl.className = "log-label";
      const ts = new Date().toLocaleTimeString();
      lbl.innerHTML = `${ts} &mdash; ${label} <button class="log-clear" onclick="this.closest('.log-entry').remove()">✕</button>`;
      entry.appendChild(lbl);

      if (!isError && display && display.kind === "recall_music") {
        entry.appendChild(renderRecallDisplay(display));
      } else {
        const text = typeof display === "string" ? display : JSON.stringify(display, null, 2);
        const pre = document.createElement("pre");
        pre.style.margin = "0";
        pre.textContent = text;
        entry.appendChild(pre);
      }

      log.prepend(entry);
    }

    function clearLog() {
      document.getElementById("log").replaceChildren();
    }

    function setEditMode(item) {
      editRecordId = String(item?.id || "");
      if (!editRecordId) return;
      document.getElementById("text").value = String(item.text || "");
      document.getElementById("metadata").value = JSON.stringify(item.metadata ?? {}, null, 2);
      document.getElementById("saveBtn").textContent = "Update Record";
      document.getElementById("cancelEditBtn").style.display = "inline-block";
      const banner = document.getElementById("editBanner");
      banner.style.display = "block";
      banner.textContent = "Editing selected record. Submit to update.";
    }

    function cancelEdit() {
      editRecordId = "";
      document.getElementById("saveBtn").textContent = "Save to Memory";
      document.getElementById("cancelEditBtn").style.display = "none";
      const banner = document.getElementById("editBanner");
      banner.style.display = "none";
      banner.textContent = "";
    }

    async function deleteMemoryItem(id, button) {
      if (!id) return;
      if (!window.confirm("Delete this memory record? This cannot be undone.")) return;
      activeDeleteButton = button || null;
      if (activeDeleteButton) {
        activeDeleteButton.disabled = true;
        activeDeleteButton.textContent = "Deleting...";
      }

      try {
        const res = await sendEvent("delete_music", id, null);
        appendLog("delete_music", res, false);

        const deleted = formatMessage(res);
        if (deleted?.deleted && activeDeleteButton) {
          const card = activeDeleteButton.closest(".result-card");
          if (card) card.remove();
        }
      } catch (e) {
        appendLog("delete_music", e.message, true);
      } finally {
        if (activeDeleteButton && document.body.contains(activeDeleteButton)) {
          activeDeleteButton.disabled = false;
          activeDeleteButton.textContent = "Delete";
        }
        activeDeleteButton = null;
      }
    }

    function editMemoryItem(item) {
      setEditMode(item);
    }

    function sendEvent(eventType, value, payload) {
      return new Promise((resolve, reject) => {
        const url = document.getElementById("wsUrl").value.trim();
        let ws;
        try { ws = new WebSocket(url); } catch (e) { return reject(e); }
        const requestId = uuid();
        const timeout = setTimeout(() => {
          ws.close();
          reject(new Error("Timeout waiting for response"));
        }, 15000);

        ws.onopen = () => {
          ws.send(JSON.stringify({
            type: "enqueue_event",
            requestId,
            payload: { eventType, value, payload }
          }));
        };

        ws.onmessage = (e) => {
          let msg;
          try { msg = JSON.parse(e.data); } catch { return; }

          if (msg.requestId === requestId) {
            if (msg.ok === false) {
              clearTimeout(timeout);
              ws.close();
              reject(new Error(msg.error?.message || "Runtime command failed"));
            }
            return;
          }

          if (msg.type === "event" && msg.eventName === "nextv_error") {
            clearTimeout(timeout);
            ws.close();
            reject(new Error(msg.payload?.message || "Runtime execution failed"));
            return;
          }

          if (
            msg.type === "event"
            && msg.eventName === "nextv_execution"
            && msg.payload?.event?.type === eventType
            && msg.payload?.event?.value === value
          ) {
            clearTimeout(timeout);
            ws.close();
            resolve(msg);
          }
        };

        ws.onerror = (e) => { clearTimeout(timeout); reject(new Error("WebSocket error")); };
        ws.onclose = (e) => { if (!e.wasClean) { clearTimeout(timeout); reject(new Error("WebSocket closed unexpectedly")); } };
      });
    }

    async function save() {
      const text = document.getElementById("text").value.trim();
      const metaRaw = document.getElementById("metadata").value.trim();
      const btn = document.getElementById("saveBtn");

      if (!text) { appendLog("remember_music", "Text field is required.", true); return; }

      let metadata;
      try { metadata = JSON.parse(metaRaw); }
      catch (e) { appendLog("remember_music", "Metadata is not valid JSON:\n" + e.message, true); return; }

      btn.disabled = true;
      try {
        if (editRecordId) {
          const res = await sendEvent("update_music", editRecordId, { text, metadata });
          appendLog("update_music", res, false);
          cancelEdit();
        } else {
          const res = await sendEvent("remember_music", text, metadata);
          appendLog("remember_music", res, false);
        }
      } catch (e) {
        appendLog(editRecordId ? "update_music" : "remember_music", e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    async function recall() {
      const query = document.getElementById("query").value.trim();
      const selectedLimit = Number(document.getElementById("queryLimit")?.value ?? 10);
      const limit = Number.isFinite(selectedLimit) && selectedLimit > 0 ? selectedLimit : 10;
      const filter = collectRecallFilters();
      if (!query) { appendLog("recall_music", "Query field is required.", true); return; }
      try {
        const res = await sendEvent("recall_music", query, { limit, filter });
        appendLog("recall_music", res, false);
      } catch (e) {
        appendLog("recall_music", e.message, true);
      }
    }

    addFilterRow("category", "music");
  </script>
</body>
</html>
